name: Run Tests

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: pr-tests-${{ github.event.pull_request.head.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: "${{ github.workspace }}:${{ github.workspace }}/src:${{ github.workspace }}/tests"
    steps:
      - uses: actions/checkout@v6
        with:
            fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        run: |
          pytest -v -o "addopts=-v --tb=long"

      - name: Run Test Drift Script
        if: always()
        id: run_drift
        env:
          PYTEST_ADDOPTS: "-q --tb=no --no-summary"
        run: |
          python tests/scripts/test_drift.py \
            --baseline master \
            --target tests/core/test_substruct_matching.py::test_substruct_matches \
            --report tests/reports/DRIFT_REPORT_substruct_matching_cicd.md

      - name: Publish to GitHub Step Summary
        if: always()
        run: |
          cat tests/reports/DRIFT_REPORT_substruct_matching_cicd.md >> $GITHUB_STEP_SUMMARY

