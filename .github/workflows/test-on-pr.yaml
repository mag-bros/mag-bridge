name: Run Tests

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-pr-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: "${{ github.workspace }}:${{ github.workspace }}/src:${{ github.workspace }}/tests"
    steps:
      - name: Checkout
        # https://github.com/actions/checkout/tree/v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        # https://github.com/actions/setup-python/tree/v6.2.0
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: |
          pytest -v -o "addopts=-v --tb=long"

      - name: Run Test Drift Script
        if: always()
        id: run_drift
        env:
          PYTEST_ADDOPTS: "-q --tb=no --no-summary"
        run: |
          git fetch origin bondtype-match-query-tool --depth=1
          python tests/scripts/test_drift.py \
            --baseline origin/bondtype-match-query-tool \
            --target tests/core/test_substruct_matching.py::test_substruct_matches \
            --report tests/reports/DRIFT_REPORT_substruct_matching_cicd.md

      - name: Publish to GitHub Step Summary
        if: always()
        run: |
          cat tests/reports/DRIFT_REPORT_substruct_matching_cicd.md >> $GITHUB_STEP_SUMMARY
