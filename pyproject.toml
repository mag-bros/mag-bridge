[tool.pytest.ini_options]
pythonpath = ["."]

[tool.pyright]
include = ["backend", "src"]
venvPath = "."
venv = ".venv"
reportMissingImports = false
reportMissingModuleSource = false
reportUndefinedVariable = false
typeCheckingMode = "standard"

[tool.ruff]
# Default line length is 88
line-length = 150
indent-width = 4

[tool.ruff.lint]
select = ["E501", "I"]
fixable = ["I"]

[tool.yamllint.rules]
line-length = { max = 200 }
quoted-strings = "disable"

# [tool.pytest.ini_options]
# addopts = "--tb=long -vv"
