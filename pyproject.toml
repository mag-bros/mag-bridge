[tool.pytest.ini_options]
pythonpath = ["."]

[tool.pyright]
include = ["backend", "src"]
venvPath = "."
venv = ".venv"
reportMissingImports = false
reportMissingModuleSource = false
reportUndefinedVariable = false
typeCheckingMode = "standard"

[tool.ruff]
src = ["src", "backend"]
line-length = 150        # default 88
indent-width = 4

[tool.ruff.lint]
select = ["E501", "I", "F401"]
fixable = ["I", "F401"]

[tool.yamllint.rules]
line-length = { max = 200 }
quoted-strings = "disable"

